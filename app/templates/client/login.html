<!doctype html><html><head><meta charset="utf-8"><title>Login</title></head><body>
<h2>Client Login</h2>{% if error %}<p style="color:red">{{error}}</p>{% endif %}
<form method="post" action="/client/login">
<input name="email" placeholder="Email" required style="width:320px"><br><br>
<input name="password" placeholder="Password" type="password" required style="width:320px"><br><br>
<button type="submit">Login</button></form>
<p><a href="/client/register">Register</a> | <a href="/">Back</a></p></body></html>
